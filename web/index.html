<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Daily Meal — chia sẻ món ăn, công thức và hành trình dinh dưỡng.">
  <meta name="theme-color" content="#9CCB3B">
  <meta name="google-signin-client_id" content="20654020356-nsqam5ladrg7j5v6agefq8pucnrcqtn8.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Daily Meal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Daily Meal</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.dailyMealPush = {
      readiness: function(publicKey) {
        if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) return 'unsupported';
        if (!publicKey) return 'missing-public-key';
        if (Notification.permission === 'denied') return 'permission-denied';
        if (Notification.permission !== 'granted') return 'needs-permission';
        return 'ready';
      },
      subscribe: async function(publicKey) {
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') throw new Error('permission-denied');
        const registration = await navigator.serviceWorker.register('push-service-worker.js', { scope: './push/' });
        let subscription = await registration.pushManager.getSubscription();
        if (!subscription) {
          const padding = '='.repeat((4 - publicKey.length % 4) % 4);
          const raw = atob((publicKey + padding).replace(/-/g, '+').replace(/_/g, '/'));
          const key = Uint8Array.from([...raw].map((char) => char.charCodeAt(0)));
          subscription = await registration.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
        }
        localStorage.setItem('dailymeal.webPushEndpoint', subscription.endpoint);
        return JSON.stringify(subscription.toJSON());
      },
      endpoint: function() { return localStorage.getItem('dailymeal.webPushEndpoint') || ''; },
      clearEndpoint: function() { localStorage.removeItem('dailymeal.webPushEndpoint'); },
    };
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
